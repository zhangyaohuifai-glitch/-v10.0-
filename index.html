// ==================== 工具函數 ====================
function calcDistance(lat1,lng1,lat2,lng2) {
    const R = 6371000;
    const radLat1 = lat1 * Math.PI / 180;
    const radLat2 = lat2 * Math.PI / 180;
    const deltaLat = (lat2-lat1) * Math.PI / 180;
    const deltaLng = (lng2-lng1) * Math.PI / 180;
    const a = Math.sin(deltaLat/2)**2 + Math.cos(radLat1)*Math.cos(radLat2)*Math.sin(deltaLng/2)**2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}
function debounce(fn, delay=500) {
    let timer = null;
    return (...args)=>{
        clearTimeout(timer);
        timer = setTimeout(()=>fn(...args), delay);
    }
}
function throttle(fn, delay=300) {
    let last = 0;
    return (...args)=>{
        const now = Date.now();
        if(now - last >= delay) {
            last = now;
            fn(...args);
        }
    }
}
// 清理所有後台線程防記憶體洩漏
function cleanupAllListeners() {
    activeListeners.forEach(unsub=>unsub());
    activeListeners = [];
    if(heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
    if(gpsWatchId) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
    if(isRecording && mediaRecorder) {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t=>t.stop());
        mediaRecorder = null;
        isRecording = false;
    }
    speechQueue = [];
    speechBusy = false;
    window.speechSynthesis.cancel();
}

// 彈出提示
function showToast(text) {
    const toast = document.createElement("div");
    toast.style.position="fixed"; toast.style.bottom="30px"; toast.style.left="50%";
    toast.style.transform="translateX(-50%)"; toast.style.background="#000c";
    toast.style.color="white"; toast.style.padding="10px 20px"; toast.style.borderRadius="6px";
    toast.style.zIndex="99999"; toast.innerText = text;
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),2500);
}
// 動態渲染站點橫條
function renderStationBar() {
    const names = driverData.mode === "busy" ? STATION_NAMES_BUSY : STATION_NAMES_NORMAL;
    const bar = document.getElementById("stationBar");
    bar.innerHTML = "";
    names.forEach((name, idx)=>{
        const span = document.createElement("span");
        span.className = "station-item" + (idx === driverData.stationIndex ? " station-active" : "");
        span.innerText = name;
        bar.appendChild(span);
    })
}
// 更新路線/方向標籤UI
function updateRouteTagUI() {
    const modeTag = document.getElementById("modeTag");
    const dirTag = document.getElementById("dirTag");
    dirTag.className = driverData.direction === "toYuenlong" ? "tag-to-yuenlong" : "tag-to-bigtang";
    modeTag.innerText = driverData.mode === "busy" ? "繁忙時段短線" : "大循環線";
    dirTag.innerText = driverData.direction === "toYuenlong" ? "往元朗" : "往大棠";
}

// ==================== 音頻語音系統 ====================
function initAudioSystem() {
    if(audioContext) return;
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioContext.createGain();
    gainNode.gain.value = VOICE_GAIN_RATIO;
    gainNode.connect(audioContext.destination);
}
function unlockSpeech() {
    initAudioSystem();
    if(audioContext.state === "suspended") audioContext.resume();
}
function speak(text) {
    unlockSpeech();
    speechQueue.push(text);
    runSpeechQueue();
}
async function runSpeechQueue() {
    if(speechBusy || speechQueue.length === 0) return;
    speechBusy = true;
    const utter = new SpeechSynthesisUtterance(speechQueue.shift());
    utter.lang = "zh-HK";
    utter.rate = 0.98;
    utter.volume = 1.0;
    utter.onend = ()=>{
        speechBusy = false;
        setTimeout(runSpeechQueue,100);
    }
    window.speechSynthesis.speak(utter);
}
async function playAudioBlob(blob) {
    unlockSpeech();
    const buffer = await audioContext.decodeAudioData(await blob.arrayBuffer());
    const src = audioContext.createBufferSource();
    src.buffer = buffer;
    src.connect(gainNode);
    src.start();
}
// 錄音控制
async function startRecord() {
    if(isRecording) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        stream.getAudioTracks().forEach(track=>{
            if(track.applyConstraints) track.applyConstraints({volume:1.0});
        });
        mediaRecorder = new MediaRecorder(stream, {mimeType:"audio/webm"});
        audioChunks = [];
        mediaRecorder.ondataavailable = e=>audioChunks.push(e.data);
        mediaRecorder.start();
        isRecording = true;
        showToast("🎤 正在錄音，放開發送");
    } catch(err) {
        showToast("❌ 無法開啟麥克風，請開啟權限");
    }
}
function stopRecord() {
    if(!isRecording || !mediaRecorder) return;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    mediaRecorder.onstop = async ()=>{
        const blob = new Blob(audioChunks, {type:"audio/webm"});
        await playAudioBlob(blob);
        showToast("✅ 錄音播放完畢");
        mediaRecorder = null;
        isRecording = false;
    }
}

// ==================== 可拖曳浮動按鈕（邊界限制唔會拖出畫面） ====================
function initDraggableButtons() {
    const btns = ["float-voice-btn","float-announce-btn","float-msg-btn"];
    btns.forEach(id=>{
        const el = document.getElementById(id);
        const storageKey = `float_btn_${id}_pos`;
        const saved = localStorage.getItem(storageKey);
        if(saved) {
            const pos = JSON.parse(saved);
            el.style.left = pos.left;
            el.style.top = pos.top;
            el.style.right = "auto";
        }
        let dragStartX, dragStartY, elStartX, elStartY;
        const startDrag = e=>{
            unlockSpeech();
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            dragStartX = touch.clientX;
            dragStartY = touch.clientY;
            const rect = el.getBoundingClientRect();
            elStartX = rect.left;
            elStartY = rect.top;
            document.addEventListener("mousemove", dragMove);
            document.addEventListener("touchmove", dragMove);
            document.addEventListener("mouseup", dragEnd);
            document.addEventListener("touchend", dragEnd);
        }
        const dragMove = throttle(e=>{
            const touch = e.touches ? e.touches[0] : e;
            const dx = touch.clientX - dragStartX;
            const dy = touch.clientY - dragStartY;
            let newX = elStartX + dx;
            let newY = elStartY + dy;
            const btnW = el.offsetWidth;
            const btnH = el.offsetHeight;
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            newX = Math.max(0, Math.min(newX, winW - btnW));
            newY = Math.max(0, Math.min(newY, winH - btnH));
            el.style.left = `${newX}px`;
            el.style.top = `${newY}px`;
            el.style.right = "auto";
        }, 300);
        const dragEnd = ()=>{
            document.removeEventListener("mousemove", dragMove);
            document.removeEventListener("touchmove", dragMove);
            document.removeEventListener("mouseup", dragEnd);
            document.removeEventListener("touchend", dragEnd);
            localStorage.setItem(storageKey, JSON.stringify({
                left: el.style.left,
                top: el.style.top
            }));
        }
        el.addEventListener("mousedown", startDrag);
        el.addEventListener("touchstart", startDrag);
    })
}

// ==================== Firebase 數據同步 ====================
function syncDriverToDB() {
    if(!driverData.plate || !driverData.isActive) return;
    const stationNames = driverData.mode === "busy" ? STATION_NAMES_BUSY : STATION_NAMES_NORMAL;
    const idx = driverData.stationIndex;
    const data = {
        plate: driverData.plate,
        phone: driverData.phone,
        mode: driverData.mode,
        direction: driverData.direction,
        stationIndex: idx,
        currentStation: stationNames[idx],
        nextStation: stationNames[idx+1] || "總站",
        passengerCount: driverData.passengerCount,
        carSeats: driverData.carSeats,
        isFull: driverData.isFull,
        isActive: true,
        directionText: driverData.direction === "toYuenlong" ? "往元朗" : "往大棠",
        lastUpdate: Date.now()
    };
    db.ref(`van/active_buses/${driverData.plate}`).update(data).catch(err=>console.log("同步錯誤",err));
}
function startHeartbeat() {
    if(heartbeatTimer) return;
    syncDriverToDB();
    heartbeatTimer = setInterval(()=>syncDriverToDB(), HEARTBEAT_INTERVAL);
}
function stopHeartbeat() {
    if(heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
    }
    if(driverData.plate) db.ref(`van/active_buses/${driverData.plate}`).update({isActive:false});
}

// ==================== GPS定位自動切站 ====================
function startGPS() {
    if(gpsWatchId) return;
    driverData.isActive = true;
    startHeartbeat();
    showToast("🟢 已開啟當值，GPS開始定位");
    speak("開始當值，GPS定位完成");
    gpsWatchId = navigator.geolocation.watchPosition(throttle(pos=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const route = driverData.mode === "busy" ? COORDS_BUSY : COORDS_NORMAL;
        const stationNames = driverData.mode === "busy" ? STATION_NAMES_BUSY : STATION_NAMES_NORMAL;
        let minDist = 999999;
        let minIdx = driverData.stationIndex;
        const startIdx = Math.max(0, driverData.stationIndex - 3);
        const endIdx = Math.min(route.length-1, driverData.stationIndex + 3);
        for(let i=startIdx; i<=endIdx; i++) {
            // 未測繪坐標(0,0)跳過計算
            if(route[i].lat === 0 && route[i].lng === 0) continue;
            const d = calcDistance(lat, lng, route[i].lat, route[i].lng);
            if(d < minDist) {
                minDist = d;
                minIdx = i;
            }
        }
        const distText = Math.round(minDist);
        document.getElementById("stationDistance").innerText = distText;
        document.getElementById("nearStationTip").innerText = minDist <= TRIGGER_DISTANCE ? "｜已進入站點範圍" : "";

        if(minDist <= TRIGGER_DISTANCE) {
            if(minIdx !== driverData.stationIndex) {
                driverData.stationIndex = minIdx;
                document.getElementById("currentStationName").innerText = stationNames[minIdx];
                document.getElementById("nextStationName").innerText = stationNames[minIdx+1] || "總站";
                renderStationBar();
                speak("已到達 " + stationNames[minIdx]);
                syncDriverToDB();
            }
        }
    },300), err=>{
        showToast("❌ GPS定位失敗，請開啟定位權限");
    },{enableHighAccuracy:true, maximumAge:200, timeout:3000});
}
function stopGPS() {
    driverData.isActive = false;
    stopHeartbeat();
    if(gpsWatchId) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
    }
    document.getElementById("startGPSBtn").innerText = "🟢 開始當值 (GPS)";
    showToast("🔴 已結束當值");
    speak("結束當值");
}

// ==================== 乘客頁載入在線小巴列表 ====================
function loadBusList() {
    const unsub = db.ref("van/active_buses").on("value", snap=>{
        const now = Date.now();
        const wrap = document.getElementById("busListWrap");
        const emptyTip = document.getElementById("emptyBusTip");
        wrap.innerHTML = "";
        let hasBus = false;
        snap.forEach(child=>{
            const bus = child.val();
            if(now - bus.lastUpdate > OFFLINE_FILTER_MS || !bus.isActive) return;
            hasBus = true;
            const div = document.createElement("div");
            div.className = "bus-list-item";
            div.innerHTML = `
                <h3>${bus.plate}</h3>
                <p>路線：${bus.mode === "busy" ? "繁忙時段短線" : "大循環線"} ${bus.directionText}</p>
                <p>目前站點：${bus.currentStation}</p>
                <p>乘客數：${bus.passengerCount}/${bus.carSeats} ${bus.isFull ? "｜滿座" : ""}</p>
            `;
            wrap.appendChild(div);
        })
        emptyTip.style.display = hasBus ? "none" : "block";
    });
    activeListeners.push(unsub);
}

// ==================== 綁定所有按鈕事件 ====================
function bindAllButton() {
    const deb = debounce;
    // 首頁入口
    document.getElementById("entranceDriver").addEventListener("click", deb(()=>{
        switchPage("page-driver");
        renderStationBar();
        updateRouteTagUI();
    }));
    document.getElementById("entrancePassenger").addEventListener("click", deb(()=>{
        switchPage("page-passenger");
        loadBusList();
    }));
    // 返回按鈕
    document.querySelectorAll(".back-btn").forEach(btn=>{
        btn.addEventListener("click", deb(()=>switchPage("page-home")));
    })
    // QR生成
    document.getElementById("genQrBtn").addEventListener("click", deb(()=>showToast("分享QR Code功能開發中")));
    // 登入彈窗
    document.getElementById("btnDriverPassLogin").addEventListener("click", deb(()=>{
        switchPage("page-driver");
        renderStationBar();
        updateRouteTagUI();
    }));
    document.getElementById("btnAdminLogin").addEventListener("click", deb(()=>showToast("管理員面板開發中")));

    // 加減乘客
    document.getElementById("addPassenger").addEventListener("click", deb(()=>{
        const max = driverData.carSeats;
        if(driverData.passengerCount < max) {
            driverData.passengerCount++;
            document.getElementById("passengerNum").innerText = driverData.passengerCount;
            driverData.isFull = driverData.passengerCount >= max;
            document.getElementById("fullSeatBtn").classList.toggle("full-active", driverData.isFull);
            syncDriverToDB();
        } else showToast("已達座位上限");
    }));
    document.getElementById("minusPassenger").addEventListener("click", deb(()=>{
        if(driverData.passengerCount > 0) {
            driverData.passengerCount--;
            document.getElementById("passengerNum").innerText = driverData.passengerCount;
            driverData.isFull = false;
            document.getElementById("fullSeatBtn").classList.remove("full-active");
            syncDriverToDB();
        } else showToast("乘客數不能少於0");
    }));
    // 上下一站
    document.getElementById("prevStation").addEventListener("click", deb(()=>{
        const maxIdx = driverData.mode === "busy" ? COORDS_BUSY.length-1 : COORDS_NORMAL.length-1;
        if(driverData.stationIndex > 0) {
            driverData.stationIndex--;
            const names = driverData.mode === "busy" ? STATION_NAMES_BUSY : STATION_NAMES_NORMAL;
            document.getElementById("currentStationName").innerText = names[driverData.stationIndex];
            document.getElementById("nextStationName").innerText = names[driverData.stationIndex+1] || "總站";
            renderStationBar();
            syncDriverToDB();
        }
    }));
    document.getElementById("nextStationBtn").addEventListener("click", deb(()=>{
        const maxIdx = driverData.mode === "busy" ? COORDS_BUSY.length-1 : COORDS_NORMAL.length-1;
        if(driverData.stationIndex < maxIdx) {
            driverData.stationIndex++;
            const names = driverData.mode === "busy" ? STATION_NAMES_BUSY : STATION_NAMES_NORMAL;
            document.getElementById("currentStationName").innerText = names[driverData.stationIndex];
            document.getElementById("nextStationName").innerText = names[driverData.stationIndex+1] || "總站";
            renderStationBar();
            syncDriverToDB();
        }
    }));
    // 滿座切換
    document.getElementById("fullSeatBtn").addEventListener("click", deb(()=>{
        driverData.isFull = !driverData.isFull;
        document.getElementById("fullSeatBtn").classList.toggle("full-active", driverData.isFull);
        showToast(driverData.isFull ? "已標記滿座" : "解除滿座標記");
        syncDriverToDB();
    }));
    // 座位切換16/19
    document.getElementById("seatSwitchBtn").addEventListener("click", deb(()=>{
        driverData.carSeats = driverData.carSeats === 16 ? 19 : 16;
        document.getElementById("seatSwitchBtn").innerText = driverData.carSeats + "座";
        if(driverData.passengerCount > driverData.carSeats) driverData.passengerCount = driverData.carSeats;
        document.getElementById("passengerNum").innerText = driverData.passengerCount;
        driverData.isFull = driverData.passengerCount >= driverData.carSeats;
        document.getElementById("fullSeatBtn").classList.toggle("full-active", driverData.isFull);
        syncDriverToDB();
    }));
    // 調頭切換方向
    document.getElementById("turnBackBtn").addEventListener("click", deb(()=>{
        driverData.direction = driverData.direction === "toYuenlong" ? "toBigTang" : "toYuenlong";
        updateRouteTagUI();
        const dirName = driverData.direction === "toYuenlong" ? "往元朗" : "往大棠";
        showToast("已切換行車方向：" + dirName);
        speak("行車方向切換為" + dirName);
        syncDriverToDB();
    }));
    // 切換繁忙/大循環路線
    document.getElementById("switchRouteBtn").addEventListener("click", deb(()=>{
        driverData.mode = driverData.mode === "busy" ? "normal" : "busy";
        driverData.stationIndex = 0;
        const names = driverData.mode === "busy" ? STATION_NAMES_BUSY : STATION_NAMES_NORMAL;
        document.getElementById("currentStationName").innerText = names[0];
        document.getElementById("nextStationName").innerText = names[1];
        renderStationBar();
        updateRouteTagUI();
        const routeName = driverData.mode === "busy" ? "繁忙時段短線" : "大循環線";
        showToast("已切換為" + routeName);
        speak("切換至" + routeName);
        syncDriverToDB();
    }));
    // GPS開關
    document.getElementById("startGPSBtn").addEventListener("click", deb(()=>{
        if(gpsWatchId) {
            stopGPS();
            document.getElementById("startGPSBtn").innerText = "🟢 開始當值 (GPS)";
        } else {
            startGPS();
            document.getElementById("startGPSBtn").innerText = "🔴 結束當值 (GPS)";
        }
    }));
    // 摺疊對講機
    document.getElementById("foldTalkBtn").addEventListener("click", deb(()=>{
        const body = document.getElementById("talkBoxBody");
        if(body.classList.contains("fold")) {
            body.classList.remove("fold");
            document.getElementById("foldTalkBtn").innerText = "摺疊";
        } else {
            body.classList.add("fold");
            document.getElementById("foldTalkBtn").innerText = "展開";
        }
    }));
    // 錄音長按
    const micBtn = document.getElementById("recordTalkBtn");
    micBtn.addEventListener("mousedown", startRecord);
    micBtn.addEventListener("touchstart", startRecord);
    micBtn.addEventListener("mouseup", stopRecord);
    micBtn.addEventListener("touchend", stopRecord);
    // 浮動按鈕功能
    document.getElementById("float-voice-btn").addEventListener("click", deb(()=>{
        if(audioContext) {
            gainNode.gain.value = gainNode.gain.value > 0 ? 0 : VOICE_GAIN_RATIO;
            showToast(gainNode.gain.value === 0 ? "🔇 已靜音所有語音" : "🔊 解除靜音，最大音量播放");
        } else showToast("請先點擊畫面解鎖語音");
    }));
    document.getElementById("float-announce-btn").addEventListener("click", deb(()=>showToast("🔔 公告面板開發中")));
    document.getElementById("float-msg-btn").addEventListener("click", deb(()=>showToast("💬 乘客訊息面板開發中")));
}

// ==================== 系統初始化 ====================
function initSystem() {
    initDraggableButtons();
    bindAllButton();
    // 修正手機vh高度
    const setVh = ()=>{
        document.documentElement.style.setProperty("--vh", window.innerHeight / 100 + "px");
    }
    setVh();
    window.addEventListener("resize", setVh);
    window.addEventListener("orientationchange", setVh);
    // 首次點擊解鎖語音
    document.body.addEventListener("click", unlockSpeech, {once:true});
    // 離開頁面強制清理資源
    window.addEventListener("beforeunload", cleanupAllListeners);
    // 開頁預渲染站點條
    renderStationBar();
    updateRouteTagUI();
}
window.addEventListener("DOMContentLoaded", initSystem);
</script>

<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>西鐵小巴 v10.7</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.37/dist/ua-parser.min.js"></script>
<style>
/* 同之前一模一樣嘅 style，因為太長我省略，但實際使用時要保留 */
:root { --bg: #0f0f0f; --card: #1c1c1e; --gold: #ffcc00; --blue: #0a84ff; --red: #ff453a; --green: #30d158; --purple: #bf5af2; --orange: #ff9500; --radius: 16px; }
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }
body { background:var(--bg); color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.header { padding:10px; text-align:center; border-bottom:1px solid #333; flex-shrink:0; position:relative; }
.title { font-size:32px; font-weight:800; color:var(--gold); }
.dev-tag { font-size:16px; color:#aaa; cursor:pointer; }
.global-voice-toggle { position:absolute; top:8px; right:10px; width:52px; height:52px; border-radius:50%; background:var(--green); border:none; color:#fff; font-size:26px; cursor:pointer; }
.global-voice-toggle.muted { background:var(--red); }
.view { display:none; flex:1; overflow-y:auto; padding:12px; flex-direction:column; }
.view.active { display:flex; }
.card { background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:12px; border:1px solid #333; }
.btn { width:100%; padding:18px; border-radius:16px; font-size:24px; font-weight:700; border:none; cursor:pointer; color:#fff; margin-bottom:10px; transition:0.15s; display:flex; align-items:center; justify-content:center; gap:10px; }
.btn:active { opacity:0.8; transform:scale(0.97); }
.btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-portal { background:linear-gradient(135deg,#0a84ff,#0066cc); }
.btn-driver { background:linear-gradient(135deg,#ff453a,#c62828); }
.btn-secondary { background:#3a3a3c; }
.btn-warn { background:#ff9f0a; color:#000; }
.btn-green { background:var(--green); }
.btn-red { background:var(--red); }
.btn-purple { background:var(--purple); }
.row { display:flex; gap:12px; margin-bottom:10px; }
.row>* { flex:1; }
.badge { display:inline-block; padding:8px 20px; border-radius:20px; font-weight:700; font-size:18px; margin:4px; }
.badge-red { background:var(--red); } .badge-blue { background:var(--blue); } .badge-purple { background:var(--purple); }
.big-number { font-size:56px; font-weight:800; text-align:center; margin:4px 0; color:var(--gold); }
.station-name { font-size:32px; font-weight:700; text-align:center; margin:4px 0; color:var(--gold); }
.msg-area { background:#1a1a1a; border-radius:14px; padding:12px; margin-top:8px; }
.msg-list { max-height:200px; overflow-y:auto; margin-bottom:8px; font-size:16px; }
.msg-row { display:flex; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid #333; flex-wrap:wrap; }
.msg-input { flex:1; padding:14px; border-radius:12px; border:none; font-size:18px; background:#2c2c2e; color:#fff; min-width:100px; }
.record-btn, .send-btn { width:56px; height:56px; border-radius:14px; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.record-btn { background:#ff9f0a; color:#000; font-size:26px; }
.record-btn.recording { background:#ff0000; color:#fff; animation:pulse 0.6s infinite; }
.send-btn { background:var(--blue); color:#fff; font-size:18px; font-weight:700; }
@keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.08)} }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 28px; border-radius:30px; font-size:18px; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; max-width:90%; }
.toast.show { opacity:1; }
.login-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.login-modal.active { display:flex; }
.login-card { background:#1c1c1e; border:2px solid var(--gold); border-radius:20px; padding:24px; max-width:400px; width:100%; text-align:center; }
.login-card input { width:100%; padding:16px; margin:8px 0; border-radius:12px; border:none; font-size:20px; background:#2c2c2e; color:#fff; }
.route-strip { display:flex; overflow-x:auto; gap:14px; padding:10px 0; border-top:1px solid #333; margin-top:8px; }
.dot-node { flex:0 0 90px; text-align:center; font-size:14px; transition:all 0.3s; }
.dot { width:28px; height:28px; border-radius:50%; background:#444; margin:0 auto 4px; border:2px solid #555; transition:all 0.3s; }
.dot-node.current .dot { background:var(--green); box-shadow:0 0 16px var(--green); border-color:#fff; }
.dot-node.current span { color:#fff; font-weight:700; }
.dot-node.next .dot { background:var(--green); animation:blink 0.8s infinite; border-color:#fff; }
.dot-node.next span { color:var(--green); font-weight:600; }
.dot-node.passed .dot { background:#666; border-color:#888; }
.dot-node.passed span { color:#888; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.play-audio { background:var(--blue); color:#fff; border:none; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:15px; }
.walkie-talkie { background:#2c1a3a; border:2px solid var(--gold); border-radius:16px; padding:16px; margin-top:8px; }
.walkie-talkie .btn { font-size:28px; padding:20px; }
.walkie-talkie .record-btn { width:72px; height:72px; font-size:32px; }
.admin-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.admin-tab { flex:1; min-width:70px; padding:12px 8px; background:#2c2c2e; border:none; color:#888; border-radius:12px; cursor:pointer; font-size:16px; font-weight:700; transition:0.3s; }
.admin-tab.active { background:var(--gold); color:#000; }
.admin-section { display:none; }
.admin-section.active { display:block; }
.admin-stat-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.admin-stat-card { background:#2c2c2e; border-radius:12px; padding:12px; text-align:center; }
.admin-stat-card .label { font-size:14px; color:#888; }
.admin-stat-card .value { font-size:28px; font-weight:800; color:var(--gold); }
.admin-item { background:#2c2c2e; border-radius:10px; padding:12px; margin-bottom:8px; border-left:3px solid var(--blue); }
.admin-item .title { font-size:18px; font-weight:700; color:var(--gold); }
.admin-item .info { font-size:15px; color:#ccc; margin-top:2px; }
.admin-input { flex:1; padding:14px; border-radius:10px; border:none; font-size:18px; background:#2c2c2e; color:#fff; min-width:60px; }
.floating-announce { position:fixed; bottom:80px; right:16px; width:60px; height:60px; border-radius:50%; background:var(--green); border:none; color:#fff; font-size:28px; cursor:pointer; z-index:15; box-shadow:0 4px 14px rgba(0,0,0,0.4); transition:all 0.3s; }
.floating-announce.has-new { background:var(--orange); animation:pulse-orange 1s infinite; }
@keyframes pulse-orange { 0%,100%{transform:scale(1)}50%{transform:scale(1.08)} }
.announce-bell { position:fixed; top:10px; right:68px; z-index:30; background:#333; color:#fff; border:none; border-radius:50%; width:44px; height:44px; font-size:22px; display:none; align-items:center; justify-content:center; cursor:pointer; }
.announce-bell.has-announce { display:flex; background:#ffcc00; color:#000; }
.announce-bell .dot-badge { position:absolute; top:-2px; right:-2px; background:#ff0000; border-radius:50%; width:12px; height:12px; }
.announce-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:30; display:none; flex-direction:column; padding:16px; }
.announce-overlay.show { display:flex; }
.announce-list { flex:1; overflow-y:auto; background:#1a1a1a; border-radius:14px; padding:12px; margin-top:12px; }
.announce-item { background:#2c2c2e; border-radius:10px; padding:12px; margin-bottom:8px; border-left:3px solid var(--gold); }
.announce-item .time { font-size:12px; color:#888; }
.announce-item .text { font-size:16px; }
.announce-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:40; display:none; align-items:center; justify-content:center; padding:20px; }
.announce-modal.active { display:flex; }
.announce-modal .modal-card { background:#2c1a3a; border:2px solid var(--gold); border-radius:20px; padding:24px; max-width:400px; width:100%; text-align:center; }
.announce-modal .modal-text { font-size:22px; color:#fff; margin-bottom:12px; }
.announce-modal .close-btn { background:var(--gold); color:#000; border:none; padding:12px 24px; border-radius:12px; font-size:20px; font-weight:bold; cursor:pointer; }
.msg-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:20; display:none; flex-direction:column; padding:16px; }
.msg-overlay.show { display:flex; }
.overlay-btn { position:fixed; bottom:20px; right:20px; background:var(--gold); color:#000; border:none; border-radius:28px; padding:16px 24px; font-weight:800; font-size:22px; box-shadow:0 4px 14px rgba(255,204,0,0.3); z-index:10; }
.donate-card { background:#2c1a3a; border:2px solid var(--gold); border-radius:16px; padding:16px; text-align:center; margin-top:8px; }
.donate-card .fps-code { background:#000; padding:12px; border-radius:12px; display:inline-block; font-size:20px; color:var(--gold); cursor:pointer; }
#voice-toggle { font-size:28px !important; padding:20px !important; min-height:80px; }
</style>
</head>
